<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown to Word Converter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; overflow: hidden; }

    /* Header */
    .header { background: #2c3e50; color: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; height: 46px; flex-shrink: 0; }
    .header h1 { font-size: 16px; font-weight: 500; white-space: nowrap; }
    .header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .header-btn { padding: 5px 10px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: white; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; transition: background 0.2s; }
    .header-btn:hover { background: rgba(255,255,255,0.2); }
    .header-btn.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.4); }
    .header-btn svg { width: 14px; height: 14px; }

    /* Container */
    .container { display: flex; height: calc(100vh - 46px); overflow: hidden; }

    /* Columns */
    .editor-col { flex: 0 0 auto; width: 360px; display: flex; flex-direction: column; background: #fafafa; min-width: 220px; max-width: 50vw; }
    .preview-col { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 380px; background: #e8e8e8; }
    .config-col { flex: 0 0 auto; width: 260px; display: flex; flex-direction: column; background: white; min-width: 200px; max-width: 40vw; }

    /* Resizer */
    .resizer { flex: 0 0 auto; width: 6px; background: #e0e0e0; cursor: col-resize; display: flex; align-items: center; justify-content: center; transition: background 0.15s; position: relative; z-index: 10; }
    .resizer:hover, .resizer.resizing { background: #3498db; }
    .resizer::after { content: ''; display: block; width: 2px; height: 28px; background: #bbb; border-radius: 1px; transition: background 0.15s; }
    .resizer:hover::after, .resizer.resizing::after { background: white; }

    /* Hidden state */
    .hidden { display: none !important; }

    /* Column headers */
    .col-header { background: #fff; border-bottom: 1px solid #ddd; padding: 7px 12px; font-size: 12px; font-weight: 600; color: #666; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .col-header .tag { background: #e8f4fd; color: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 11px; }

    /* Toolbar */
    .toolbar { background: #fff; border-bottom: 1px solid #ddd; padding: 5px 10px; display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }
    .toolbar button { padding: 4px 8px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; line-height: 1; }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.primary { background: #3498db; color: white; border-color: #3498db; }
    .toolbar button.primary:hover { background: #2980b9; }

    textarea#markdown { display: none; }
    .editor-col .CodeMirror { flex: 1; min-height: 0; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.6; border: none; background: #fafafa; }
    .editor-col .CodeMirror-gutters { background: #f0f0f0; border-right: 1px solid #ddd; }
    .heading-sizes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .heading-sizes .form-group { margin-bottom: 4px; }
    .heading-sizes .form-group label { font-size: 10px; }
    .heading-sizes .form-group input { padding: 3px 5px; font-size: 11px; }
    .color-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .color-row label { font-size: 11px; color: #888; flex: 1; }
    .color-row input[type=color] { width: 28px; height: 22px; padding: 0; border: 1px solid #ddd; border-radius: 3px; cursor: pointer; }
    /* Markdown preview styles */
    .md-preview { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.7; color: #24292e; max-width: 800px; margin: 0 auto; padding: 24px; background: white; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .md-preview h1,.md-preview h2,.md-preview h3,.md-preview h4,.md-preview h5,.md-preview h6 { margin: 1.2em 0 0.6em; font-weight: 600; line-height: 1.25; }
    .md-preview h1 { font-size: 2em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    .md-preview h2 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    .md-preview h3 { font-size: 1.25em; }
    .md-preview p { margin: 0.8em 0; }
    .md-preview code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 85%; font-family: Consolas, Monaco, monospace; }
    .md-preview pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
    .md-preview pre code { background: none; padding: 0; font-size: 85%; }
    .md-preview blockquote { border-left: 4px solid #dfe2e5; padding: 0 1em; color: #6a737d; margin: 0.8em 0; }
    .md-preview table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    .md-preview th, .md-preview td { border: 1px solid #dfe2e5; padding: 8px 12px; text-align: left; }
    .md-preview th { background: #f6f8fa; font-weight: 600; }
    .md-preview img { max-width: 100%; border-radius: 4px; }
    .md-preview a { color: #0366d6; text-decoration: none; }
    .md-preview a:hover { text-decoration: underline; }
    .md-preview hr { border: none; border-top: 2px solid #eee; margin: 1.5em 0; }
    .md-preview ul, .md-preview ol { padding-left: 2em; margin: 0.5em 0; }
    .md-preview li { margin: 0.3em 0; }
    .md-preview s { color: #999; }

    /* Preview */
    #preview-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }
    #preview { flex: 1; width: 100%; border: none; background: white; min-height: 0; }
    .preview-toolbar {
      background: #fff; border-bottom: 1px solid #ddd; padding: 5px 10px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex-shrink: 0;
    }
    .preview-toolbar button {
      padding: 4px 10px; border: 1px solid #ddd; background: white; border-radius: 4px;
      cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .preview-toolbar button:hover { background: #f0f0f0; }
    .preview-toolbar button.primary { background: #3498db; color: white; border-color: #3498db; }
    .preview-toolbar button.primary:hover { background: #2980b9; }
    .preview-toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview-error { padding: 20px; color: #e74c3c; font-size: 13px; text-align: center; }

    /* Config */
    .config-col { overflow-y: auto; }
    .config-section { margin-bottom: 14px; padding: 0 12px; }
    .config-section h3 { font-size: 12px; color: #666; margin: 10px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
    .form-group input, .form-group select { width: 100%; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #3498db; }

    .status-bar { background: #fff; border-top: 1px solid #ddd; padding: 5px 12px; font-size: 11px; color: #888; display: flex; justify-content: space-between; flex-shrink: 0; }
    .loading { opacity: 0.6; pointer-events: none; }
    .toast { position: fixed; bottom: 16px; right: 16px; padding: 10px 18px; border-radius: 6px; color: white; font-size: 13px; z-index: 1000; transition: opacity 0.3s; }
    .toast.success { background: #27ae60; }
    .toast.error { background: #e74c3c; }

    /* Overlay hint for narrow iframe */
    .iframe-hint {
      position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white;
      padding: 3px 8px; border-radius: 3px; font-size: 11px; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5;
    }
    .iframe-hint.show { opacity: 1; }

    /* Layout when panels are hidden */
    .container.preview-hidden .editor-col { flex: 1 1 auto; width: auto !important; }
    .container.editor-hidden.preview-hidden .config-col { flex: 1 1 auto; width: auto !important; }
    .container.editor-hidden:not(.preview-hidden) .preview-col { flex: 1 1 auto; }
    .container.config-hidden:not(.preview-hidden) .preview-col { flex: 1 1 auto; }

    /* Responsive */
    @media (max-width: 1000px) {
      .editor-col { width: 300px; min-width: 200px; }
      .config-col { width: 220px; min-width: 180px; }
    }
    @media (max-width: 768px) {
      .container { overflow-x: auto; }
      .editor-col { min-width: 260px; }
      .preview-col { min-width: 320px; }
      .config-col { min-width: 180px; }
    }

    /* Smart Import Panel */
    .smart-section { background: linear-gradient(135deg, #667eea08, #764ba208); border: 1px solid #e8e0f0; border-radius: 6px; margin: 8px 12px 14px; padding: 10px; }
    .smart-section h3 { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; margin: 0 !important; padding: 0 !important; border: none !important; font-size: 12px; color: #555; }
    .smart-section h3 .toggle-arrow { transition: transform 0.2s; display: inline-block; font-size: 10px; }
    .smart-section h3 .toggle-arrow.open { transform: rotate(90deg); }
    .smart-section .smart-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .smart-section .smart-body.open { max-height: 500px; }
    .smart-section textarea { width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px; font-size: 11px; font-family: Consolas, monospace; resize: vertical; margin-top: 8px; background: #fafafa; }
    .smart-section textarea:focus { border-color: #667eea; outline: none; }
    .smart-actions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .smart-actions button { padding: 4px 8px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.15s; }
    .smart-actions button:hover { background: #f0f0f0; }
    .smart-actions button.primary { background: #667eea; color: white; border-color: #667eea; }
    .smart-actions button.primary:hover { background: #5a6fd6; }
    .smart-actions select { padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; background: white; cursor: pointer; flex: 1; min-width: 0; }
    .smart-status { font-size: 10px; color: #888; margin-top: 4px; min-height: 14px; }
    .smart-status.success { color: #27ae60; }
    .smart-status.error { color: #e74c3c; }

    /* Margin grid */
    .margin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px; }
    .margin-grid .form-group { margin-bottom: 2px; }
    .margin-grid .form-group label { font-size: 10px; }
    .margin-grid .form-group input { padding: 3px 5px; font-size: 11px; }

    /* Spec Modal */
    .spec-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
    .spec-modal-overlay.show { display: flex; }
    .spec-modal { background: white; border-radius: 10px; width: 90vw; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .spec-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .spec-modal-header h2 { font-size: 15px; margin: 0; color: #333; }
    .spec-modal-header .modal-actions { display: flex; gap: 6px; }
    .spec-modal-header button { padding: 5px 12px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .spec-modal-header button:hover { background: #f0f0f0; }
    .spec-modal-header button.copy-btn { background: #667eea; color: white; border-color: #667eea; }
    .spec-modal-header button.copy-btn:hover { background: #5a6fd6; }
    .spec-modal-body { flex: 1; overflow-y: auto; padding: 18px; }
    .spec-modal-body .md-preview { max-width: 100%; padding: 0; box-shadow: none; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.2/markdown-it.min.js"></script>
</head>
<body>
  <div class="header">
    <h1>Markdown to Word</h1>
    <div class="header-actions">
      <button class="header-btn active" id="toggleEditor" title="Toggle Markdown Editor" onclick="toggleColumn('editor')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        Editor
      </button>
      <button class="header-btn active" id="togglePreview" title="Toggle Preview Panel" onclick="toggleColumn('preview')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Preview
      </button>
      <button class="header-btn active" id="toggleConfig" title="Toggle Config Panel" onclick="toggleColumn('config')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 5 15.4a1.65 1.65 0 0 0-1.51 1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 5 9.6a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19 9.6a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Config
      </button>
      <span style="font-size: 11px; opacity: 0.7; margin-left: 4px;">TypeScript + docx.js + Collabora</span>
    </div>
  </div>

  <div class="container" id="mainContainer">
    <!-- Editor -->
    <div class="editor-col" id="editorCol">
      <div class="col-header">
        Markdown
        <span class="tag">Edit</span>
      </div>
      <div class="toolbar">
        <button onclick="insertText('**', '**')" title="Bold"><b>B</b></button>
        <button onclick="insertText('*', '*')" title="Italic"><i>I</i></button>
        <button onclick="insertText('<u>', '</u>')" title="Underline"><u>U</u></button>
        <button onclick="insertText('# ', '')" title="Heading">H1</button>
        <button onclick="insertText('## ', '')" title="Heading 2">H2</button>
        <button onclick="insertText('### ', '')" title="Heading 3">H3</button>
        <button onclick="insertText('- ', '')" title="List">List</button>
        <button onclick="insertText('1. ', '')" title="Ordered List">Num</button>
        <button onclick="insertText('> ', '')" title="Quote">Quote</button>
        <button onclick="insertText('```\n', '\n```')" title="Code Block">Code</button>
        <button onclick="insertText('| A | B |\n|---|---|\n| 1 | 2 |', '')" title="Table">Table</button>
        <div style="flex:1"></div>
        <button class="primary" id="convertBtn" onclick="convert()">Download .docx</button>
      </div>

This is a **bold** and *italic* text example. You can also use <u>underline</u>.

}

      <div class="status-bar">
        <span id="charCount">0 chars</span>
        <span id="status">Ready</span>
      </div>
    </div>

    <div class="resizer" id="resizer1" data-target="editorCol" data-min="220" data-max="600"></div>

    <!-- Preview -->
    <div class="preview-col" id="previewCol">
      <div class="col-header">
        Preview
        <select id="previewMode" onchange="changePreviewMode()" style="margin-left:8px;font-size:11px;padding:2px 4px;border-radius:3px;border:1px solid #ddd;background:#fff;outline:none;cursor:pointer;">
          <option value="markdown">Markdown (Instant)</option>
          <option value="html">HTML Creative ✨</option>
          <option value="local">Docx Preview (Fast)</option>
          <option value="pdf">PDF Preview (Hi-Fi)</option>
          <option value="collabora">Collabora (Edit)</option>
        </select>
        <select id="htmlTemplate" onchange="refreshEditor()" style="display:none;margin-left:4px;font-size:11px;padding:2px 4px;border-radius:3px;border:1px solid #ddd;background:#fff;outline:none;cursor:pointer;">
          <option value="modernDark">🌙 Modern Dark</option>
          <option value="glassmorphism">🔮 Glassmorphism</option>
          <option value="magazine">📰 Editorial</option>
          <option value="neonCyber">⚡ Neon Cyber</option>
        </select>
        <span class="tag" style="background:#fff3e0;color:#e65100;" id="previewModeTag">Markdown</span>
      </div>
      <div class="preview-toolbar">
        <button id="refreshBtn" onclick="refreshEditor()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh Editor
        </button>
        <button id="downloadBtn" onclick="downloadDocx()" disabled>
          Download .docx
        </button>
        <button id="exportPdfBtn" onclick="exportPdf()" disabled>
          Export PDF
        </button>
        <label style="font-size:11px;display:flex;align-items:center;gap:3px;margin-left:auto;cursor:pointer;color:#666;">
          <input type="checkbox" id="autoPreview" checked> Auto
        </label>
        <span id="previewStatus" style="font-size:11px;color:#888;">Ready</span>
      </div>
      <div id="preview-wrap">
        <div id="local-preview" style="flex:1;overflow:auto;background:#e8e8e8;padding:20px;"></div>
        <iframe id="preview" allow="fullscreen; clipboard-read; clipboard-write" style="display:none;"></iframe>
        <div class="iframe-hint" id="iframeHint">Drag resizers or hide panels for more space</div>
      </div>
    </div>

    <div class="resizer" id="resizer2" data-target="configCol" data-min="200" data-max="450"></div>

    <!-- Config -->

        <h3 onclick="toggleSmart()"><span class="toggle-arrow" id="smartArrow">▶</span> Smart Config Import</h3>
        <div class="smart-body" id="smartBody">
          <textarea id="smartInput" placeholder="Paste config text from AI here..."></textarea>

            <select id="presetTemplate" onchange="loadPreset()">

              <option value="business">Business Report</option>
              <option value="resume">Resume</option>
            </select>
            <button class="primary" onclick="applySmartConfig()">Apply</button>
            <button onclick="exportSmartConfig()">Export</button>
            <button onclick="openSpecModal()">Spec / Prompts</button>
          </div>
          <div id="smartStatus" class="smart-status"></div>
        </div>
      </div>

      <div class="config-section">
        <h3>Document Info</h3>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="docTitle" value="My Document">
        </div>
        <div class="form-group">
          <label>Author</label>
          <input type="text" id="docAuthor" value="">
        </div>
      </div>

      <div class="config-section">
        <h3>Typography</h3>
        <div class="form-group">
          <label>Body Font</label>
          <input type="text" id="bodyFont" list="fonts-list" value="Microsoft YaHei">
        </div>
        <div class="form-group">
          <label>Heading Font</label>
          <input type="text" id="headingFont" list="fonts-list" value="SimHei">
        </div>
        <div class="form-group">
          <label>English Font</label>
          <input type="text" id="englishFont" list="fonts-list" value="Times New Roman">
        </div>
        <div class="form-group">
          <label>Code Font</label>
          <input type="text" id="codeFont" list="fonts-list" value="Consolas">
        </div>
        <div class="form-group">
          <label>Body Size (pt)</label>
          <input type="number" id="bodySize" value="11" min="8" max="72">
        </div>
        <div class="form-group">
          <label>Heading / Code Sizes (pt)</label>
          <div class="heading-sizes">
            <div class="form-group"><label>H1</label><input type="number" id="h1Size" value="22" min="8" max="72"></div>
            <div class="form-group"><label>H2</label><input type="number" id="h2Size" value="18" min="8" max="72"></div>
            <div class="form-group"><label>H3</label><input type="number" id="h3Size" value="16" min="8" max="72"></div>
            <div class="form-group"><label>H4</label><input type="number" id="h4Size" value="14" min="8" max="72"></div>
            <div class="form-group"><label>H5</label><input type="number" id="h5Size" value="12" min="8" max="72"></div>
            <div class="form-group"><label>H6</label><input type="number" id="h6Size" value="11" min="8" max="72"></div>
            <div class="form-group"><label>Code</label><input type="number" id="codeSize" value="10" min="6" max="72"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Line Spacing</label>
          <input type="number" id="lineSpacing" value="1.5" min="1" step="0.1">
        </div>
        <div class="margin-grid">
          <div class="form-group"><label>Para Space(pt)</label><input type="number" id="paragraphSpacing" value="6" min="0"></div>
          <div class="form-group"><label>Head Space(pt)</label><input type="number" id="headingSpacing" value="12" min="0"></div>
        </div>
      </div>

      <div class="config-section">
        <h3>Colors</h3>
        <div class="color-row"><label>Heading</label><input type="color" id="headingColor" value="#000000"></div>
        <div class="color-row"><label>Text</label><input type="color" id="textColor" value="#000000"></div>
        <div class="color-row"><label>Link</label><input type="color" id="linkColor" value="#0563C1"></div>
        <div class="color-row"><label>Code BG</label><input type="color" id="codeBgColor" value="#F5F5F5"></div>
        <div class="color-row"><label>Quote Border</label><input type="color" id="quoteBorderColor" value="#CCCCCC"></div>
      </div>

      <div class="config-section">
        <h3>Page Layout</h3>
        <div class="form-group">
          <label>Page Size</label>
          <select id="pageSize">
            <option value="A4" selected>A4</option>
            <option value="Letter">Letter</option>
          </select>
        </div>
        <div class="form-group">
          <label>Orientation</label>
          <select id="orientation">
            <option value="portrait" selected>Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </div>
        <div class="form-group">
          <label>Margins (twips)</label>
          <div class="margin-grid">
            <div class="form-group"><label>Top</label><input type="number" id="marginTop" value="1440" min="0" step="100"></div>
            <div class="form-group"><label>Bottom</label><input type="number" id="marginBottom" value="1440" min="0" step="100"></div>
            <div class="form-group"><label>Left</label><input type="number" id="marginLeft" value="1440" min="0" step="100"></div>
            <div class="form-group"><label>Right</label><input type="number" id="marginRight" value="1440" min="0" step="100"></div>
          </div>
        </div>
      </div>

      <div class="config-section">
        <h3>Header & Footer</h3>
        <div class="form-group">
          <label>Header Text</label>
          <input type="text" id="headerText" value="" placeholder="e.g. Document Title">
        </div>
        <div class="form-group">
          <label>Footer Text</label>
          <input type="text" id="footerText" value="" placeholder="e.g. Confidential">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="showPageNumbers" style="width:auto;">
          <label style="margin:0;font-size:12px;color:#555;">Show page numbers</label>
        </div>
      </div>

      <div class="config-section">
        <h3>Images</h3>
        <div class="form-group">
          <label>Max Width (%)</label>
          <input type="number" id="imageWidth" value="80" min="10" max="100">
        </div>
        <div class="form-group">
          <label>Default Align</label>
          <select id="imageAlign">
            <option value="center" selected>Center</option>
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <!-- Spec Modal -->
  <div id="specModal" class="spec-modal-overlay">
    <div class="spec-modal">
      <div class="spec-modal-header">
        <h2>Document Info Configuration Spec</h2>
        <div class="modal-actions">
          <button class="copy-btn" onclick="copySpec()">Copy Spec to Clipboard</button>
          <button onclick="closeSpecModal()">Close</button>
        </div>
      </div>
      <div class="spec-modal-body" id="specModalBody">
        <div class="md-preview" id="specContent">Loading...</div>
      </div>
    </div>
  </div>

  <datalist id="fonts-list">
    <option value="Microsoft YaHei">微软雅黑</option>
    <option value="SimSun">宋体</option>
    <option value="SimHei">黑体</option>
    <option value="KaiTi">楷体</option>
    <option value="FangSong">仿宋</option>
    <option value="DengXian">等线</option>
    <option value="STZhongsong">华文中宋</option>
    <option value="Arial">Arial</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Consolas">Consolas</option>
    <option value="Calibri">Calibri</option>
  </datalist>

  <script>
    /* === Utility === */
    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
    function hexToDocx(hex) { return hex.replace('#', ''); }

    /* === DOM refs === */
    const markdownEl = document.getElementById('markdown');
    const previewEl = document.getElementById('preview');
    const charCountEl = document.getElementById('charCount');
    const statusEl = document.getElementById('status');
    const convertBtn = document.getElementById('convertBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const previewStatusEl = document.getElementById('previewStatus');
    const editorCol = document.getElementById('editorCol');
    const previewCol = document.getElementById('previewCol');
    const configCol = document.getElementById('configCol');
    const resizer1 = document.getElementById('resizer1');
    const resizer2 = document.getElementById('resizer2');
    const toggleEditorBtn = document.getElementById('toggleEditor');
    const togglePreviewBtn = document.getElementById('togglePreview');
    const toggleConfigBtn = document.getElementById('toggleConfig');
    const iframeHint = document.getElementById('iframeHint');
    const localPreviewEl = document.getElementById('local-preview');
    const previewModeSelect = document.getElementById('previewMode');
    const previewModeTag = document.getElementById('previewModeTag');

    let currentFileId = null;
    let currentAccessToken = null;
    let currentLocalBlob = null;
    let currentPdfBlob = null;
    let currentPdfUrl = null;
    const autoPreviewEl = document.getElementById('autoPreview');
    /* === Smart Import Logic === */
    function toggleSmart() {
      const body = document.getElementById('smartBody');
      const arrow = document.getElementById('smartArrow');
      body.classList.toggle('open');
      arrow.classList.toggle('open');
    }

    const PRESETS = {
      academic: `body-font: SimSun
heading-font: SimHei
english-font: Times New Roman
code-font: Courier New
body-size: 12
h1-size: 22
h2-size: 18
h3-size: 16
h4-size: 14
h5-size: 12
h6-size: 12
code-size: 10
line-spacing: 1.5
paragraph-spacing: 0
heading-spacing: 12
margin-top: 1440
margin-bottom: 1440
margin-left: 1800
margin-right: 1800
heading-color: #000000
text-color: #000000
link-color: #000000
page-size: A4
orientation: portrait
page-numbers: true
image-max-width: 80
image-align: center`,
      business: `body-font: Microsoft YaHei
heading-font: Microsoft YaHei
english-font: Calibri
code-font: Consolas
body-size: 11
h1-size: 24
h2-size: 18
h3-size: 14
h4-size: 12
h5-size: 11
h6-size: 11
code-size: 10
line-spacing: 1.5
paragraph-spacing: 6
heading-spacing: 12
margin-top: 1440
margin-bottom: 1440
margin-left: 1440
margin-right: 1440
heading-color: #1a3c6e
text-color: #333333
link-color: #0563C1
page-size: A4
orientation: portrait
page-numbers: true
image-max-width: 90
image-align: center`,
      resume: `body-font: Microsoft YaHei
heading-font: SimHei
english-font: Arial
code-font: Consolas
body-size: 11
h1-size: 20
h2-size: 14
h3-size: 12
h4-size: 11
h5-size: 11
h6-size: 11
code-size: 10
line-spacing: 1.15
paragraph-spacing: 3
heading-spacing: 6
margin-top: 720
margin-bottom: 720
margin-left: 720
margin-right: 720
heading-color: #2c3e50
text-color: #333333
link-color: #3498db
page-size: A4
orientation: portrait
page-numbers: false
image-max-width: 30
image-align: right`
    };

    function loadPreset() {
      const select = document.getElementById('presetTemplate');
      if (select.value && PRESETS[select.value]) {
        document.getElementById('smartInput').value = PRESETS[select.value];
      }
    }

    function setFieldValue(id, value) {
      const el = document.getElementById(id);
      if (!el || value === undefined || value === null || value === '') return;
      if (el.type === 'checkbox') { el.checked = (value === true || value === 'true'); return; }
      const strVal = String(value);
      if (el.type === 'color' && !strVal.startsWith('#')) el.value = '#' + strVal;
      else el.value = strVal;
    }

    function parseNaturalLanguage(text) {
      const config = {};
      if (/宋体/.test(text)) config['body-font'] = 'SimSun';
      if (/黑体/.test(text)) config['heading-font'] = 'SimHei';
      if (/楷体/.test(text)) config['body-font'] = 'KaiTi';
      if (/微软雅黑/.test(text)) config['body-font'] = 'Microsoft YaHei';
      
      const sizeMatch = text.match(/([0-9]+)号字/);
      if (sizeMatch) config['body-size'] = parseInt(sizeMatch[1]);
      
      const lineSpaceMatch = text.match(/行距([0-9.]+)倍/);
      if (lineSpaceMatch) config['line-spacing'] = parseFloat(lineSpaceMatch[1]);
      
      if (/A4/.test(text)) config['page-size'] = 'A4';
      if (/横向/.test(text)) config['orientation'] = 'landscape';
      if (/纵向/.test(text)) config['orientation'] = 'portrait';
      
      return config;
    }

    function applySmartConfig() {
      const input = document.getElementById('smartInput').value.trim();
      const status = document.getElementById('smartStatus');
      if (!input) {
        status.textContent = 'Please paste config text first.';
        status.className = 'smart-status error';
        return;
      }

      let parsed = {};
      try {
        if (input.startsWith('{')) {
          // JSON format
          const json = JSON.parse(input);
          parsed = {
            'body-font': json.font?.body,
            'heading-font': json.font?.heading,
            'english-font': json.font?.english,
            'code-font': json.font?.code,
            'body-size': json.size?.body,
            'h1-size': json.size?.heading1,
            'h2-size': json.size?.heading2,
            'h3-size': json.size?.heading3,
            'h4-size': json.size?.heading4,
            'h5-size': json.size?.heading5,
            'h6-size': json.size?.heading6,
            'code-size': json.size?.code,
            'line-spacing': json.spacing?.lineSpacing,
            'paragraph-spacing': json.spacing?.paragraphSpacing,
            'heading-spacing': json.spacing?.headingSpacing,
            'margin-top': json.margin?.top,
            'margin-bottom': json.margin?.bottom,
            'margin-left': json.margin?.left,
            'margin-right': json.margin?.right,
            'heading-color': json.color?.heading,
            'text-color': json.color?.text,
            'link-color': json.color?.link,
            'code-bg-color': json.color?.codeBackground,
            'quote-border-color': json.color?.blockquoteBorder,
            'page-size': json.pageSize,
            'orientation': json.orientation,
            'header-text': json.headerFooter?.header,
            'footer-text': json.headerFooter?.footer,
            'page-numbers': json.headerFooter?.pageNumbers,
            'image-max-width': json.image?.maxWidthPercent,
            'image-align': json.image?.defaultAlign,
            'doc-title': json.meta?.title,
            'doc-author': json.meta?.author,
          };
        } else if (input.includes(':')) {
          // Key-Value format
          input.split('\n').forEach(line => {
            const parts = line.split(':');
            if (parts.length >= 2) {
              let key = parts[0].trim().toLowerCase();
              let val = parts.slice(1).join(':').trim();
              if (val === 'true') val = true;
              if (val === 'false') val = false;
              if (val.includes('(')) val = val.split('(')[0].trim(); // Remove comments like "SimSun (宋体)"
              parsed[key] = val;
            }
          });
        } else {
          // Natural language guess
          parsed = parseNaturalLanguage(input);
        }

        // Apply values
        const mappings = {
          'body-font': 'bodyFont', 'heading-font': 'headingFont', 'english-font': 'englishFont', 'code-font': 'codeFont',
          'body-size': 'bodySize', 'h1-size': 'h1Size', 'h2-size': 'h2Size', 'h3-size': 'h3Size', 'h4-size': 'h4Size', 'h5-size': 'h5Size', 'h6-size': 'h6Size', 'code-size': 'codeSize',
          'line-spacing': 'lineSpacing', 'paragraph-spacing': 'paragraphSpacing', 'heading-spacing': 'headingSpacing',
          'margin-top': 'marginTop', 'margin-bottom': 'marginBottom', 'margin-left': 'marginLeft', 'margin-right': 'marginRight',
          'heading-color': 'headingColor', 'text-color': 'textColor', 'link-color': 'linkColor', 'code-bg-color': 'codeBgColor', 'quote-border-color': 'quoteBorderColor',
          'page-size': 'pageSize', 'orientation': 'orientation', 'header-text': 'headerText', 'footer-text': 'footerText', 'page-numbers': 'showPageNumbers',
          'image-max-width': 'imageWidth', 'image-align': 'imageAlign', 'doc-title': 'docTitle', 'doc-author': 'docAuthor'
        };

        if (parsed['margins']) {
          parsed['margin-top'] = parsed['margins']; parsed['margin-bottom'] = parsed['margins'];
          parsed['margin-left'] = parsed['margins']; parsed['margin-right'] = parsed['margins'];
        }

        let applied = 0;
        for (const [key, id] of Object.entries(mappings)) {
          if (parsed[key] !== undefined) {
            setFieldValue(id, parsed[key]);
            applied++;
          }
        }

        status.textContent = `Success: applied ${applied} settings.`;
        status.className = 'smart-status success';
        
        // Trigger auto-preview update
        if (autoPreviewEl.checked) debouncedConfigPreview();

      } catch (err) {
        status.textContent = 'Error parsing config: ' + err.message;
        status.className = 'smart-status error';
      }
    }

    function exportSmartConfig() {
      const g = id => document.getElementById(id).value;
      const text = [
        'body-font: ' + g('bodyFont'),
        'heading-font: ' + g('headingFont'),
        'english-font: ' + g('englishFont'),
        'code-font: ' + g('codeFont'),
        'body-size: ' + g('bodySize'),
        'h1-size: ' + g('h1Size'),
        'h2-size: ' + g('h2Size'),
        'h3-size: ' + g('h3Size'),
        'h4-size: ' + g('h4Size'),
        'h5-size: ' + g('h5Size'),
        'h6-size: ' + g('h6Size'),
        'code-size: ' + g('codeSize'),
        'line-spacing: ' + g('lineSpacing'),
        'paragraph-spacing: ' + g('paragraphSpacing'),
        'heading-spacing: ' + g('headingSpacing'),
        'margin-top: ' + g('marginTop'),
        'margin-bottom: ' + g('marginBottom'),
        'margin-left: ' + g('marginLeft'),
        'margin-right: ' + g('marginRight'),
        'heading-color: ' + g('headingColor'),
        'text-color: ' + g('textColor'),
        'link-color: ' + g('linkColor'),
        'code-bg-color: ' + g('codeBgColor'),
        'quote-border-color: ' + g('quoteBorderColor'),
        'page-size: ' + g('pageSize'),
        'orientation: ' + g('orientation'),
        'header-text: ' + g('headerText'),
        'footer-text: ' + g('footerText'),
        'page-numbers: ' + document.getElementById('showPageNumbers').checked,
        'image-max-width: ' + g('imageWidth'),
        'image-align: ' + g('imageAlign'),
      ].join('\n');
      
      document.getElementById('smartInput').value = text;
      document.getElementById('smartStatus').textContent = 'Config exported. You can copy this text.';
      document.getElementById('smartStatus').className = 'smart-status success';
      document.getElementById('presetTemplate').value = '';
    }

    async function openSpecModal() {
      document.getElementById('specModal').classList.add('show');
      const contentEl = document.getElementById('specContent');
      try {
        const res = await fetch('CONFIG_SPEC.md');
        if (res.ok) {
          const mdText = await res.text();
          contentEl.innerHTML = mdit.render(mdText);
          contentEl.dataset.rawMd = mdText;
        } else {
          contentEl.innerHTML = '<p>Could not load CONFIG_SPEC.md</p>';
        }
      } catch (e) {
        contentEl.innerHTML = '<p>Error loading spec.</p>';
      }
    }

    function closeSpecModal() {
      document.getElementById('specModal').classList.remove('show');
    }

    function copySpec() {
      const rawMd = document.getElementById('specContent').dataset.rawMd;
      if (rawMd) {
        navigator.clipboard.writeText(rawMd).then(() => {
          showToast('Specification copied to clipboard!');
        });
      }
    }

    /* === CodeMirror Editor === */
    const cm = CodeMirror.fromTextArea(markdownEl, {
      mode: 'markdown',
      lineNumbers: true,
      lineWrapping: true,
      theme: 'default',
      extraKeys: {
        'Ctrl-B': () => insertText('**', '**'),
        'Ctrl-I': () => insertText('*', '*'),
        'Ctrl-S': (c) => { c.save(); convert(); },
      },
    });

    /* === Auto-preview on editor change === */
    const debouncedPreview = debounce(() => {
      const m = previewModeSelect.value;
      if (autoPreviewEl.checked && (m === 'local' || m === 'markdown' || m === 'html')) refreshEditor();
    }, 800);
    cm.on('change', () => {
      charCountEl.textContent = `${cm.getValue().length} chars`;
      debouncedPreview();
    });
    charCountEl.textContent = `${cm.getValue().length} chars`;

    /* === Auto-preview on config change === */
    const debouncedConfigPreview = debounce(() => {
      const m = previewModeSelect.value;
      if (autoPreviewEl.checked && (m === 'local' || m === 'markdown' || m === 'html')) refreshEditor();
    }, 800);
    document.getElementById('configCol').addEventListener('change', debouncedConfigPreview);
    document.getElementById('configCol').addEventListener('input', debounce(debouncedConfigPreview, 500));

    /* === Column widths from localStorage === */
    function loadWidths() {
      const ew = localStorage.getItem('editorWidth');
      const cw = localStorage.getItem('configWidth');
      if (ew) editorCol.style.width = ew + 'px';
      if (cw) configCol.style.width = cw + 'px';
    }
    loadWidths();

    /* === Toggle columns === */
    function toggleColumn(which) {
      const container = document.getElementById('mainContainer');
      if (which === 'editor') {
        editorCol.classList.toggle('hidden');
        resizer1.classList.toggle('hidden');
        toggleEditorBtn.classList.toggle('active', !editorCol.classList.contains('hidden'));
        container.classList.toggle('editor-hidden', editorCol.classList.contains('hidden'));
      } else if (which === 'preview') {
        previewCol.classList.toggle('hidden');
        resizer1.classList.toggle('hidden');
        resizer2.classList.toggle('hidden');
        togglePreviewBtn.classList.toggle('active', !previewCol.classList.contains('hidden'));
        container.classList.toggle('preview-hidden', previewCol.classList.contains('hidden'));
      } else {
        configCol.classList.toggle('hidden');
        resizer2.classList.toggle('hidden');
        toggleConfigBtn.classList.toggle('active', !configCol.classList.contains('hidden'));
        container.classList.toggle('config-hidden', configCol.classList.contains('hidden'));
      }
      checkIframeWidth();
    }

    /* === Resizers === */
    let resizing = null;
    let startX = 0;
    let startWidth = 0;
    let targetEl = null;
    let minW = 0;
    let maxW = 0;

    function onMouseDown(e, resizer) {
      resizing = resizer;
      targetEl = document.getElementById(resizer.dataset.target);
      minW = parseInt(resizer.dataset.min, 10);
      maxW = parseInt(resizer.dataset.max, 10);
      startX = e.clientX;
      startWidth = targetEl.offsetWidth;
      resizer.classList.add('resizing');
      document.body.style.userSelect = 'none';
      e.preventDefault();
    }

    resizer1.addEventListener('mousedown', (e) => onMouseDown(e, resizer1));
    resizer2.addEventListener('mousedown', (e) => onMouseDown(e, resizer2));

    document.addEventListener('mousemove', (e) => {
      if (!resizing) return;
      const dx = resizing.id === 'resizer1' ? e.clientX - startX : startX - e.clientX;
      const newW = Math.max(minW, Math.min(maxW, startWidth + dx));
      targetEl.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!resizing) return;
      resizing.classList.remove('resizing');
      resizing = null;
      document.body.style.userSelect = '';
      if (targetEl) {
        localStorage.setItem(targetEl.id === 'editorCol' ? 'editorWidth' : 'configWidth', targetEl.offsetWidth);
        targetEl = null;
      }
      checkIframeWidth();
    });

    /* === Iframe width hint === */
    function checkIframeWidth() {
      if (previewCol.classList.contains('hidden')) {
        iframeHint.classList.remove('show');
        return;
      }
      const w = previewCol.offsetWidth;
      if (w < 500) {
        iframeHint.classList.add('show');
        iframeHint.textContent = w < 380 ? 'Window too narrow — hide side panels' : 'Drag resizers or hide panels for more space';
      } else {
        iframeHint.classList.remove('show');
      }
    }
    window.addEventListener('resize', checkIframeWidth);
    checkIframeWidth();

    /* === Editor helpers === */
    function getConfig() {
      return {
        font: {
          body: document.getElementById('bodyFont').value || 'Microsoft YaHei',
          heading: document.getElementById('headingFont').value || 'SimHei',
          english: document.getElementById('englishFont').value || 'Times New Roman',
          code: document.getElementById('codeFont').value || 'Consolas',
        },
        size: {
          body: parseInt(document.getElementById('bodySize').value) || 11,
          heading1: parseInt(document.getElementById('h1Size').value) || 22,
          heading2: parseInt(document.getElementById('h2Size').value) || 18,
          heading3: parseInt(document.getElementById('h3Size').value) || 16,
          heading4: parseInt(document.getElementById('h4Size').value) || 14,
          heading5: parseInt(document.getElementById('h5Size').value) || 12,
          heading6: parseInt(document.getElementById('h6Size').value) || 11,
          code: parseInt(document.getElementById('codeSize').value) || 10,
        },
        spacing: { 
          lineSpacing: parseFloat(document.getElementById('lineSpacing').value) || 1.5,
          paragraphSpacing: parseInt(document.getElementById('paragraphSpacing').value) || 6,
          headingSpacing: parseInt(document.getElementById('headingSpacing').value) || 12,
        },
        margin: { 
          top: parseInt(document.getElementById('marginTop').value) || 1440,
          bottom: parseInt(document.getElementById('marginBottom').value) || 1440,
          left: parseInt(document.getElementById('marginLeft').value) || 1440,
          right: parseInt(document.getElementById('marginRight').value) || 1440
        },
        color: {
          heading: hexToDocx(document.getElementById('headingColor').value),
          text: hexToDocx(document.getElementById('textColor').value),
          link: hexToDocx(document.getElementById('linkColor').value),
          codeBackground: hexToDocx(document.getElementById('codeBgColor').value),
          blockquoteBorder: hexToDocx(document.getElementById('quoteBorderColor').value),
        },
        headerFooter: {
          header: document.getElementById('headerText').value || undefined,
          footer: document.getElementById('footerText').value || undefined,
          pageNumbers: document.getElementById('showPageNumbers').checked,
        },
        image: {
          maxWidthPercent: parseInt(document.getElementById('imageWidth').value) || 80,
          defaultAlign: document.getElementById('imageAlign').value,
        },
        pageSize: document.getElementById('pageSize').value,
        orientation: document.getElementById('orientation').value,
      };
    }

    function getMeta() {
      return {
        title: document.getElementById('docTitle').value || 'Document',

    /* === Preview Mode Switch === */
    const htmlTemplateSelect = document.getElementById('htmlTemplate');
    function changePreviewMode() {
      const mode = previewModeSelect.value;
      htmlTemplateSelect.style.display = mode === 'html' ? 'inline-block' : 'none';
      if (mode === 'markdown') {
        previewModeTag.textContent = 'Markdown';
        previewModeTag.style.background = '#fff3e0';
        previewModeTag.style.color = '#e65100';
        previewEl.style.display = 'none';
        localPreviewEl.style.display = 'block';
      } else if (mode === 'html') {
        previewModeTag.textContent = 'HTML ✨';
        previewModeTag.style.background = '#fce4ec';
        previewModeTag.style.color = '#c62828';
        previewEl.style.display = 'none';
        localPreviewEl.style.display = 'block';
      } else if (mode === 'local') {
        previewModeTag.textContent = 'docx-preview';
        previewModeTag.style.background = '#e8f4fd';
        previewModeTag.style.color = '#3498db';
        previewEl.style.display = 'none';
        localPreviewEl.style.display = 'block';
      } else if (mode === 'pdf') {
        previewModeTag.textContent = 'PDF';
        previewModeTag.style.background = '#e8fde8';
        previewModeTag.style.color = '#27ae60';
        previewEl.style.display = 'block';
        localPreviewEl.style.display = 'none';
      } else {
        previewModeTag.textContent = 'Collabora';
        previewModeTag.style.background = '#f3e8fd';
        previewModeTag.style.color = '#8e44ad';
        previewEl.style.display = 'block';
        localPreviewEl.style.display = 'none';
      }
      refreshEditor();
    }

    /* === Collabora / Local integration === */
    async function refreshEditor() {
      const markdown = cm.getValue();
      if (!markdown.trim()) {
        showToast('Please enter some Markdown content', 'error');
        return;
      }
      refreshBtn.disabled = true;
      previewStatusEl.textContent = 'Generating...';
      const mode = previewModeSelect.value;
      
      try {
        if (mode === 'html') {
          const templateName = document.getElementById('htmlTemplate').value || 'modernDark';
          const css = htmlTemplates[templateName] || htmlTemplates.modernDark;
          const htmlContent = mdit.render(markdown);
          const wrapperClass = templateName === 'glassmorphism' ? 'glass-container' : '';
          
          localPreviewEl.innerHTML = `
            <style>${css}</style>
            <div class="html-creative-preview">
              <div class="${wrapperClass}">
                ${htmlContent}
              </div>
            </div>
          `;
          downloadBtn.disabled = true;
          exportPdfBtn.disabled = true;
          previewStatusEl.textContent = 'Ready';
          refreshBtn.disabled = false;
          return;
        }
        if (mode === 'markdown') {
          localPreviewEl.innerHTML = `<div class="md-preview">${mdit.render(markdown)}</div>`;
          downloadBtn.disabled = true;
          exportPdfBtn.disabled = true;
          previewStatusEl.textContent = 'Ready';
          refreshBtn.disabled = false;
          return;
        }
        if (mode === 'local') {
          const response = await fetch('/api/convert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ markdown, config: getConfig(), meta: getMeta() }),
          });
          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || 'Conversion failed');
          }
          currentLocalBlob = await response.blob();
          
          await docx.renderAsync(currentLocalBlob, localPreviewEl, null, {
            inWrapper: true, ignoreWidth: false, ignoreHeight: false, ignoreFonts: false, breakPages: true, useBase64URL: true
          });
          
          downloadBtn.disabled = false;
          exportPdfBtn.disabled = false;
          previewStatusEl.textContent = 'Ready';
          showToast('Local preview loaded');
        } else if (mode === 'pdf') {
          const reqBody = JSON.stringify({ markdown, config: getConfig(), meta: getMeta() });
          const headers = { 'Content-Type': 'application/json' };
          
          const pdfResponse = await fetch('/api/convert/pdf', {
            method: 'POST', headers, body: reqBody,
          });
          if (!pdfResponse.ok) {
            const error = await pdfResponse.json();
            throw new Error(error.message || 'PDF conversion failed');
          }
          currentPdfBlob = await pdfResponse.blob();
          if (currentPdfUrl) window.URL.revokeObjectURL(currentPdfUrl);
          currentPdfUrl = window.URL.createObjectURL(currentPdfBlob);
          previewEl.src = currentPdfUrl;
          
          downloadBtn.disabled = false;
          exportPdfBtn.disabled = false;
          previewStatusEl.textContent = 'Ready';
          showToast('PDF preview loaded');
        } else {
          const response = await fetch('/api/preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ markdown, config: getConfig(), meta: getMeta() }),
          });
          if (!response.ok) {
            const error = await response.json();
            if (response.status === 503) {
              previewEl.srcdoc = `<div class="preview-error"><strong>Collabora Online unavailable</strong><br>${error.message || 'Please ensure docker-compose is running.'}</div>`;
              throw new Error('Collabora unavailable');
            }
            throw new Error(error.message || 'Preview generation failed');
          }
          const data = await response.json();
          currentFileId = data.fileId;
          currentAccessToken = data.accessToken;
          previewEl.src = data.collaboraUrl;
          downloadBtn.disabled = false;
          exportPdfBtn.disabled = false;
          previewStatusEl.textContent = 'Ready';
          showToast('Collabora loaded');
        }
      } catch (err) {
        previewStatusEl.textContent = 'Error';
        if (err.message !== 'Collabora unavailable') {
          showToast(err.message, 'error');
        }
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function insertText(before, after) {
      const selected = cm.getSelection();
      cm.replaceSelection(before + selected + after);
      if (!selected) {
        const cursor = cm.getCursor();
        cm.setCursor(cursor.line, cursor.ch - after.length);
      }
      cm.focus();
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    async function downloadDocx() {
      const mode = previewModeSelect.value;
      if (mode === 'local') {
        if (!currentLocalBlob) return showToast('Please refresh the editor first', 'error');
        const url = window.URL.createObjectURL(currentLocalBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.docx`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        showToast('Document downloaded');
        return;
      }

      if (mode === 'pdf') {
        // In PDF mode, generate docx on demand for download
        try {
          const response = await fetch('/api/convert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ markdown: markdownEl.value, config: getConfig(), meta: getMeta() }),
          });
          if (!response.ok) throw new Error('Download failed');
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${getMeta().title}.docx`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
          showToast('Document downloaded');
        } catch (err) {
          showToast(err.message, 'error');
        }
        return;
      }

      if (!currentFileId || !currentAccessToken) {
        showToast('Please refresh the editor first', 'error');
        return;
      }
      try {
        const response = await fetch(`/api/files/${currentFileId}/download?access_token=${encodeURIComponent(currentAccessToken)}`);
        if (!response.ok) throw new Error('Download failed');
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.docx`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        showToast('Document downloaded');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function exportPdf() {
      exportPdfBtn.disabled = true;
      try {
        const mode = previewModeSelect.value;
        if (mode === 'pdf' && currentPdfBlob) {
          // Already have the PDF from preview, download directly
          const url = window.URL.createObjectURL(currentPdfBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${getMeta().title}.pdf`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
          showToast('PDF exported');
          return;
        }
        
        let response;
        if (mode === 'local' || mode === 'pdf') {
          response = await fetch('/api/convert/pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ markdown: cm.getValue(), config: getConfig(), meta: getMeta() }),
          });
        } else {
          if (!currentFileId || !currentAccessToken) throw new Error('Please refresh the editor first');
          response = await fetch(`/api/files/${currentFileId}/export/pdf?access_token=${encodeURIComponent(currentAccessToken)}`, { method: 'POST' });
        }
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Export failed');
        }
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.pdf`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        showToast('PDF exported');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        exportPdfBtn.disabled = false;
      }
    }

    async function convert() {
      const markdown = cm.getValue();
      if (!markdown.trim()) {
        showToast('Please enter some Markdown content', 'error');
        return;
      }
      convertBtn.disabled = true;
      convertBtn.textContent = 'Generating...';
      statusEl.textContent = 'Converting...';
      document.body.classList.add('loading');
      try {
        const response = await fetch('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ markdown, config: getConfig(), meta: getMeta() }),
        });
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Conversion failed');
        }
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.docx`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        showToast('Document downloaded successfully!');
        statusEl.textContent = 'Done';
      } catch (err) {
        showToast(err.message, 'error');
        statusEl.textContent = 'Error';
      } finally {
        convertBtn.disabled = false;
        convertBtn.textContent = 'Download .docx';
        document.body.classList.remove('loading');
      }
    }

    /* === PostMessage from Collabora === */
    window.addEventListener('message', (e) => {
      if (!e.data || typeof e.data !== 'string') return;
      try {
        const msg = JSON.parse(e.data);
        if (msg.MessageId === 'App_LoadingStatus' && msg.Values && msg.Values.Status === 'Document_Loaded') {
          previewStatusEl.textContent = 'Editor ready';
        }
        if (msg.MessageId === 'Action_Save_Resp' && msg.Values && msg.Values.success) {
          showToast('Document saved in editor');
        }
      } catch (_) {}
    });

    /* === Responsive auto-hide on very small windows === */
    function autoHideOnResize() {
      const w = window.innerWidth;
      if (w < 800 && !configCol.classList.contains('hidden')) {
        toggleColumn('config');
      }
      if (w < 550 && !editorCol.classList.contains('hidden')) {
        toggleColumn('editor');
      }
    }
    window.addEventListener('resize', autoHideOnResize);
  </script>
