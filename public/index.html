<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown to Word Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .header { background: #2c3e50; color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 500; }
    .container { display: flex; height: calc(100vh - 50px); }

    /* Editor column */
    .editor-col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ddd; min-width: 0; }
    .col-header { background: #fff; border-bottom: 1px solid #ddd; padding: 8px 12px; font-size: 12px; font-weight: 600; color: #666; display: flex; align-items: center; gap: 8px; }
    .col-header .tag { background: #e8f4fd; color: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 11px; }

    /* Toolbar */
    .toolbar { background: #fff; border-bottom: 1px solid #ddd; padding: 6px 10px; display: flex; gap: 4px; flex-wrap: wrap; }
    .toolbar button { padding: 5px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.primary { background: #3498db; color: white; border-color: #3498db; }
    .toolbar button.primary:hover { background: #2980b9; }

    textarea#markdown { flex: 1; padding: 16px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.6; border: none; resize: none; outline: none; background: #fafafa; }

    /* Preview column */
    .preview-col { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ddd; min-width: 0; background: #e8e8e8; }
    #preview-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    #preview {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }
    .preview-toolbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .preview-toolbar button {
      padding: 5px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .preview-toolbar button:hover { background: #f0f0f0; }
    .preview-toolbar button.primary { background: #3498db; color: white; border-color: #3498db; }
    .preview-toolbar button.primary:hover { background: #2980b9; }
    .preview-toolbar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .preview-error {
      padding: 20px;
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
    }

    /* Config column */
    .config-col { width: 280px; background: white; overflow-y: auto; padding: 12px; flex-shrink: 0; }
    .config-section { margin-bottom: 16px; }
    .config-section h3 { font-size: 13px; color: #666; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
    .form-group input, .form-group select { width: 100%; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #3498db; }

    .status-bar { background: #fff; border-top: 1px solid #ddd; padding: 6px 12px; font-size: 11px; color: #888; display: flex; justify-content: space-between; }
    .loading { opacity: 0.6; pointer-events: none; }
    .toast { position: fixed; bottom: 16px; right: 16px; padding: 10px 18px; border-radius: 6px; color: white; font-size: 13px; z-index: 1000; transition: opacity 0.3s; }
    .toast.success { background: #27ae60; }
    .toast.error { background: #e74c3c; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Markdown to Word Converter</h1>
    <span style="font-size: 12px; opacity: 0.8;">TypeScript + docx.js + Collabora</span>
  </div>

  <div class="container">
    <!-- Editor -->
    <div class="editor-col">
      <div class="col-header">
        Markdown
        <span class="tag">Edit</span>
      </div>
      <div class="toolbar">
        <button onclick="insertText('**', '**')" title="Bold"><b>B</b></button>
        <button onclick="insertText('*', '*')" title="Italic"><i>I</i></button>
        <button onclick="insertText('<u>', '</u>')" title="Underline"><u>U</u></button>
        <button onclick="insertText('# ', '')" title="Heading">H1</button>
        <button onclick="insertText('## ', '')" title="Heading 2">H2</button>
        <button onclick="insertText('### ', '')" title="Heading 3">H3</button>
        <button onclick="insertText('- ', '')" title="List">List</button>
        <button onclick="insertText('1. ', '')" title="Ordered List">Num</button>
        <button onclick="insertText('> ', '')" title="Quote">Quote</button>
        <button onclick="insertText('```\n', '\n```')" title="Code Block">Code</button>
        <button onclick="insertText('| A | B |\n|---|---|\n| 1 | 2 |', '')" title="Table">Table</button>
        <div style="flex:1"></div>
        <button class="primary" id="convertBtn" onclick="convert()">Download .docx</button>
      </div>
      <textarea id="markdown" placeholder="Enter your Markdown here..."># Markdown to Word

This is a **bold** and *italic* text example. You can also use <u>underline</u>.

## Features

- Headings H1-H6
- **Bold**, *Italic*, <u>Underline</u>
- Ordered and unordered lists
- Code blocks and inline `code`
- Tables
- Images (local or URL)

### Code Example

```typescript
function hello(): void {
  console.log("Hello, World!");
}
```

### Table

| Name | Age | City |
|------|-----|------|
| Alice | 28 | Beijing |
| Bob | 32 | Shanghai |

> This is a blockquote. It shows how quoted text will appear.

---

Visit [OpenAI](https://openai.com) for more info.

### Ordered List

1. First step
2. Second step
3. Third step</textarea>
      <div class="status-bar">
        <span id="charCount">0 chars</span>
        <span id="status">Ready</span>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-col">
      <div class="col-header">
        Preview
        <span class="tag" style="background:#f3e8fd;color:#8e44ad;">Collabora</span>
      </div>
      <div class="preview-toolbar">
        <button id="refreshBtn" onclick="refreshEditor()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh Editor
        </button>
        <button id="downloadBtn" onclick="downloadDocx()" disabled>
          Download .docx
        </button>
        <button id="exportPdfBtn" onclick="exportPdf()" disabled>
          Export PDF
        </button>
        <span id="previewStatus" style="font-size:11px;color:#888;margin-left:auto;">Ready</span>
      </div>
      <div id="preview-wrap">
        <iframe id="preview" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
      </div>
    </div>

    <!-- Config -->
    <div class="config-col">
      <div class="config-section">
        <h3>Document Info</h3>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="docTitle" value="My Document">
        </div>
        <div class="form-group">
          <label>Author</label>
          <input type="text" id="docAuthor" value="">
        </div>
      </div>

      <div class="config-section">
        <h3>Typography</h3>
        <div class="form-group">
          <label>Body Font</label>
          <select id="bodyFont">
            <option value="Microsoft YaHei">Microsoft YaHei</option>
            <option value="SimSun">SimSun (宋体)</option>
            <option value="KaiTi">KaiTi (楷体)</option>
            <option value="Arial">Arial</option>
          </select>
        </div>
        <div class="form-group">
          <label>Heading Font</label>
          <select id="headingFont">
            <option value="SimHei">SimHei (黑体)</option>
            <option value="Microsoft YaHei">Microsoft YaHei</option>
            <option value="Arial">Arial</option>
          </select>
        </div>
        <div class="form-group">
          <label>Body Size (pt)</label>
          <input type="number" id="bodySize" value="11" min="8" max="72">
        </div>
        <div class="form-group">
          <label>Line Spacing</label>
          <select id="lineSpacing">
            <option value="1">Single</option>
            <option value="1.15">1.15</option>
            <option value="1.5" selected>1.5</option>
            <option value="2">Double</option>
          </select>
        </div>
      </div>

      <div class="config-section">
        <h3>Page Layout</h3>
        <div class="form-group">
          <label>Page Size</label>
          <select id="pageSize">
            <option value="A4" selected>A4</option>
            <option value="Letter">Letter</option>
          </select>
        </div>
        <div class="form-group">
          <label>Orientation</label>
          <select id="orientation">
            <option value="portrait" selected>Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </div>
        <div class="form-group">
          <label>Margins (twips)</label>
          <input type="number" id="margins" value="1440" min="0" step="100">
        </div>
      </div>

      <div class="config-section">
        <h3>Images</h3>
        <div class="form-group">
          <label>Max Width (%)</label>
          <input type="number" id="imageWidth" value="80" min="10" max="100">
        </div>
        <div class="form-group">
          <label>Default Align</label>
          <select id="imageAlign">
            <option value="center" selected>Center</option>
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    const markdownEl = document.getElementById('markdown');
    const previewEl = document.getElementById('preview');
    const charCountEl = document.getElementById('charCount');
    const statusEl = document.getElementById('status');
    const convertBtn = document.getElementById('convertBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const previewStatusEl = document.getElementById('previewStatus');

    let currentFileId = null;
    let currentAccessToken = null;

    const configEls = {
      bodyFont: document.getElementById('bodyFont'),
      headingFont: document.getElementById('headingFont'),
      bodySize: document.getElementById('bodySize'),
      lineSpacing: document.getElementById('lineSpacing'),
      pageSize: document.getElementById('pageSize'),
      orientation: document.getElementById('orientation'),
      margins: document.getElementById('margins'),
      imageWidth: document.getElementById('imageWidth'),
      imageAlign: document.getElementById('imageAlign'),
    };

    function updateCharCount() {
      charCountEl.textContent = `${markdownEl.value.length} chars`;
    }

    markdownEl.addEventListener('input', updateCharCount);
    updateCharCount();

    function getConfig() {
      const margins = parseInt(document.getElementById('margins').value) || 1440;
      return {
        font: {
          body: document.getElementById('bodyFont').value,
          heading: document.getElementById('headingFont').value,
        },
        size: {
          body: parseInt(document.getElementById('bodySize').value) || 11,
        },
        spacing: {
          lineSpacing: parseFloat(document.getElementById('lineSpacing').value) || 1.5,
        },
        margin: {
          top: margins,
          bottom: margins,
          left: margins,
          right: margins,
        },
        image: {
          maxWidthPercent: parseInt(document.getElementById('imageWidth').value) || 80,
          defaultAlign: document.getElementById('imageAlign').value,
        },
        pageSize: document.getElementById('pageSize').value,
        orientation: document.getElementById('orientation').value,
      };
    }

    function getMeta() {
      return {
        title: document.getElementById('docTitle').value || 'Document',
        author: document.getElementById('docAuthor').value,
      };
    }

    async function refreshEditor() {
      const markdown = markdownEl.value;
      if (!markdown.trim()) {
        showToast('Please enter some Markdown content', 'error');
        return;
      }

      refreshBtn.disabled = true;
      previewStatusEl.textContent = 'Generating...';

      try {
        const response = await fetch('/api/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ markdown, config: getConfig(), meta: getMeta() }),
        });

        if (!response.ok) {
          const error = await response.json();
          if (response.status === 503) {
            previewEl.srcdoc = `<div class="preview-error"><strong>Collabora Online unavailable</strong><br>${error.message || 'Please ensure docker-compose is running.'}</div>`;
            throw new Error('Collabora unavailable');
          }
          throw new Error(error.message || 'Preview generation failed');
        }

        const data = await response.json();
        currentFileId = data.fileId;
        currentAccessToken = data.accessToken;
        previewEl.src = data.collaboraUrl;
        downloadBtn.disabled = false;
        exportPdfBtn.disabled = false;
        previewStatusEl.textContent = 'Ready';
        showToast('Editor loaded');
      } catch (err) {
        previewStatusEl.textContent = 'Error';
        if (err.message !== 'Collabora unavailable') {
          showToast(err.message, 'error');
        }
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function insertText(before, after) {
      const start = markdownEl.selectionStart;
      const end = markdownEl.selectionEnd;
      const text = markdownEl.value;
      const selected = text.substring(start, end);
      const replacement = before + selected + after;
      markdownEl.value = text.substring(0, start) + replacement + text.substring(end);
      markdownEl.focus();
      markdownEl.selectionStart = start + before.length;
      markdownEl.selectionEnd = start + before.length + selected.length;
      updateCharCount();
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    async function downloadDocx() {
      if (!currentFileId || !currentAccessToken) {
        showToast('Please refresh the editor first', 'error');
        return;
      }
      try {
        const response = await fetch(`/api/files/${currentFileId}/download?access_token=${encodeURIComponent(currentAccessToken)}`);
        if (!response.ok) throw new Error('Download failed');
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.docx`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        showToast('Document downloaded');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function exportPdf() {
      if (!currentFileId || !currentAccessToken) {
        showToast('Please refresh the editor first', 'error');
        return;
      }
      exportPdfBtn.disabled = true;
      try {
        const response = await fetch(`/api/files/${currentFileId}/export/pdf?access_token=${encodeURIComponent(currentAccessToken)}`, {
          method: 'POST',
        });
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Export failed');
        }
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.pdf`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        showToast('PDF exported');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        exportPdfBtn.disabled = false;
      }
    }

    async function convert() {
      const markdown = markdownEl.value;
      if (!markdown.trim()) {
        showToast('Please enter some Markdown content', 'error');
        return;
      }

      convertBtn.disabled = true;
      convertBtn.textContent = 'Generating...';
      statusEl.textContent = 'Converting...';
      document.body.classList.add('loading');

      try {
        const response = await fetch('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ markdown, config: getConfig(), meta: getMeta() }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.message || 'Conversion failed');
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${getMeta().title}.docx`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        showToast('Document downloaded successfully!');
        statusEl.textContent = 'Done';
      } catch (err) {
        showToast(err.message, 'error');
        statusEl.textContent = 'Error';
      } finally {
        convertBtn.disabled = false;
        convertBtn.textContent = 'Download .docx';
        document.body.classList.remove('loading');
      }
    }

    // Listen for PostMessage events from Collabora iframe
    window.addEventListener('message', (e) => {
      if (!e.data || typeof e.data !== 'string') return;
      try {
        const msg = JSON.parse(e.data);
        if (msg.MessageId === 'App_LoadingStatus' && msg.Values && msg.Values.Status === 'Document_Loaded') {
          previewStatusEl.textContent = 'Editor ready';
        }
        if (msg.MessageId === 'Action_Save_Resp' && msg.Values && msg.Values.success) {
          showToast('Document saved in editor');
        }
      } catch (_) {
        // ignore non-JSON messages
      }
    });
  </script>
</body>
</html>
